<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>UEXInfo</title>
<style>
/* ── Variables ────────────────────────────────────────────────────────── */
:root {
  --alpha:     0.76;
  --bg:        rgba(10, 12, 18, var(--alpha));
  --bg-input:  rgba(8,  10, 16, calc(var(--alpha) + 0.10));
  --bg-status: rgba(6,   8, 14, calc(var(--alpha) + 0.08));
  --accent:    #00bcd4;
  --text:      #dde1e7;
  --dim:       #556;
  --yellow:    #ffd600;
  --green:     #4caf50;
  --red:       #ef5350;
  --border:    rgba(0, 188, 212, 0.20);
  --font:      "Cascadia Code", "Fira Code", "Consolas", monospace;
  --font-size: 13px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: rgba(10, 12, 18, var(--alpha));  /* fallback si PyWebView perd la transparence */
  color: var(--text);
  font-family: var(--font);
  font-size: var(--font-size);
  width: 100vw;
  height: 100vh;
  min-width: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Zone de sortie ────────────────────────────────────────────────────── */
#output {
  flex: 1;
  min-width: 0;
  width: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 6px 10px 4px;
  line-height: 1.45;
  background: var(--bg);
  word-break: break-word;
  user-select: text;
  -webkit-user-select: text;
}
#output .line { white-space: pre-wrap; min-height: 1em; }
#output .echo { opacity: 0.55; }
#output .echo::before { content: "› "; color: var(--accent); opacity: 1; }

/* Mots cliquables — termes reconnus par le vocabulaire */
.cw {
  cursor: pointer;
  border-bottom: 1px dotted currentColor;
  opacity: 0.9;
}
.cw:hover { opacity: 1; filter: brightness(1.3); }
/* Terme tronqué (préfixe «…») — tirets pour signaler que le nom complet est au survol */
.cw.cw-truncated { border-bottom-style: dashed; }

/* ── Formulaire scan log inline ────────────────────────────────────────────── */
.scan-inline {
  background: rgba(0, 120, 150, 0.06);
  border-left: 2px solid rgba(0, 188, 212, 0.28);
  margin: 5px 0;
  padding: 4px 8px 7px;
  font-size: 0.88em;
}
.scan-inline .si-head {
  display: flex; gap: 10px; align-items: center; margin-bottom: 5px;
  border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 3px;
}
.scan-inline .si-term  { color: var(--accent); font-weight: bold; }
.scan-inline .si-mode-buy  { color: var(--accent); }
.scan-inline .si-mode-sell { color: var(--yellow, #e5c07b); }
.si-warn {
  font-size: 0.80em; color: var(--yellow, #ffd600); opacity: 0.72;
  margin-bottom: 5px; padding: 2px 0;
}
.scan-inline table { border-collapse: collapse; }
.scan-inline th { color: var(--dim); font-weight: normal; font-size: 0.85em;
                  padding: 0 6px 2px; text-align: right; }
.scan-inline th:first-child { text-align: left; }
.scan-inline td { padding: 1px 4px; vertical-align: middle; }
.si-maj-btn {
  margin-top: 6px;
  background: transparent;
  border: 1px solid rgba(0,188,212,0.40);
  color: var(--accent);
  padding: 1px 16px;
  border-radius: 3px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.88em;
}
.si-maj-btn:hover { background: rgba(0,188,212,0.18); }
.si-maj-btn.done  { color: #4caf50; border-color: #4caf50; cursor: default; }
.si-row-btn {
  background: transparent;
  border: 1px solid rgba(0,188,212,0.30);
  color: var(--accent);
  padding: 0 8px;
  border-radius: 3px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.82em;
  white-space: nowrap;
}
.si-row-btn:hover { background: rgba(0,188,212,0.14); }
.si-row-btn.done  { color: #4caf50; border-color: #4caf50; cursor: default; }
.cw-commodity { color: #ffd600; }
.cw-location  { color: #00bcd4; }
.cw-ship      { color: #69f0ae; }
.cw-voyage    { color: #ff9800; }

/* ── Mission scan overlay ────────────────────────────────────────────────── */
#mission-scan-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.72);
  z-index: 200;
  overflow-y: auto;
  padding: 16px;
  box-sizing: border-box;
}
#mission-scan-overlay.open { display: flex; flex-direction: column; }
#mission-scan-box {
  background: var(--bg, #1a1a2e);
  border: 1px solid var(--border, rgba(255,255,255,0.12));
  border-radius: 6px;
  padding: 14px 16px;
  max-width: 860px;
  width: 100%;
  margin: auto;
  font-family: var(--font);
  font-size: 0.88em;
}
#mission-scan-box h3 {
  color: var(--accent);
  margin: 0 0 10px;
  font-size: 1em;
  font-weight: bold;
}
.ms-pending-note {
  color: var(--yellow, #ffd600);
  font-size: 0.82em;
  margin-bottom: 8px;
  opacity: 0.85;
}
.ms-session-head {
  color: var(--dim);
  font-size: 0.78em;
  margin: 8px 0 3px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding-bottom: 2px;
}
#mission-scan-box table {
  width: 100%;
  border-collapse: collapse;
}
#mission-scan-box th {
  color: var(--dim);
  font-weight: normal;
  font-size: 0.82em;
  padding: 2px 6px;
  text-align: left;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
#mission-scan-box td {
  padding: 2px 6px;
  vertical-align: middle;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}
#mission-scan-box tr:nth-child(even) { background: rgba(255,255,255,0.03); }
#mission-scan-box tr:hover           { background: rgba(0,188,212,0.08); cursor: pointer; }
.ms-cb     { width: 20px; text-align: center; }
.ms-hour   { color: var(--dim); width: 44px; }
.ms-cat    { color: var(--dim); font-size: 0.82em; max-width: 120px; }
.ms-title  { font-weight: bold; max-width: 220px; }
.ms-scu    { text-align: right; width: 44px; color: #69f0ae; }
.ms-reward { text-align: right; width: 80px; color: #ffd600; }
.ms-src    { color: var(--accent); max-width: 140px; }
.ms-dst    { color: var(--accent); max-width: 140px; }
.ms-dist   { text-align: right; width: 64px; color: var(--dim); font-size: 0.85em; }
.ms-err    { color: #ff5722; font-size: 0.78em; }
.ms-imported { opacity: 0.55; }
.ms-btn-row {
  display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end;
  flex-wrap: wrap;
}
.ms-btn {
  background: transparent;
  border: 1px solid rgba(0,188,212,0.4);
  color: var(--accent);
  padding: 3px 18px;
  border-radius: 3px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.88em;
}
.ms-btn:hover        { background: rgba(0,188,212,0.18); }
.ms-btn.ms-btn-voy   { border-color: rgba(255,152,0,0.5); color: #ff9800; }
.ms-btn.ms-btn-voy:hover { background: rgba(255,152,0,0.18); }
.ms-btn.ms-btn-cancel { border-color: rgba(255,255,255,0.18); color: var(--dim); }
.ms-btn.ms-btn-cancel:hover { background: rgba(255,255,255,0.07); }
.ms-sel-all {
  font-size: 0.78em; color: var(--dim); cursor: pointer;
  margin-bottom: 4px;
}
.ms-sel-all:hover { color: var(--fg); }
/* badge screenshot processed */
#sb-screencap {
  font-size: 0.78em;
  padding: 1px 6px;
  border-radius: 3px;
  cursor: pointer;
  transition: opacity 0.3s;
}
#sb-screencap.off { display: none; }
#sb-screencap.on  {
  display: inline-block;
  background: rgba(0,188,212,0.18);
  border: 1px solid rgba(0,188,212,0.4);
  color: var(--accent);
}
#sb-screencap.spinning {
  display: inline-block;
  background: rgba(255,160,0,0.15);
  border: 1px solid rgba(255,160,0,0.4);
  color: #ffa000;
  animation: ocr-pulse 1s ease-in-out infinite;
}
@keyframes ocr-pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

/* scrollbar */
#output::-webkit-scrollbar       { width: 4px; }
#output::-webkit-scrollbar-track { background: transparent; }
#output::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

/* ── Zone de saisie ────────────────────────────────────────────────────── */
#prompt-area {
  background: var(--bg-input);
  border-top: 1px solid var(--border);
  position: relative;
  flex-shrink: 0;
  min-width: 0;
  width: 100%;
}

#hint-line {
  padding: 1px 12px 0;
  color: var(--dim);
  font-size: 0.82em;
  min-height: 1.1em;
  user-select: none;
}

#input-row {
  display: flex;
  align-items: center;
  padding: 4px 10px 5px;
}
#prompt-sym {
  color: var(--accent);
  font-weight: bold;
  margin-right: 7px;
  user-select: none;
  transition: opacity 0.15s;
}
#prompt-sym.spin { color: var(--yellow); }
#cmd-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--font);
  font-size: var(--font-size);
  outline: none;
  caret-color: var(--accent);
}

/* ── Dropdown completion ───────────────────────────────────────────────── */
#completion-list {
  position: absolute;
  bottom: 100%;
  left: 0; right: 0;
  background: rgba(12, 15, 22, 0.97);
  border: 1px solid var(--border);
  border-bottom: none;
  max-height: 180px;
  overflow-y: auto;
  z-index: 100;
}
#completion-list .ci {
  padding: 3px 12px;
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  gap: 10px;
}
#completion-list .ci .cv { color: var(--accent); }
#completion-list .ci .ch { color: var(--dim); font-size: 0.88em; flex: 1; }
#completion-list .ci.sel { background: rgba(0,188,212,0.15); }
#completion-list .ci:hover { background: rgba(255,255,255,0.06); }
#completion-list::-webkit-scrollbar { width: 3px; }
#completion-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

/* ── Barre de statut ───────────────────────────────────────────────────── */
#status-bar {
  display: flex;
  align-items: center;
  flex-wrap: nowrap;
  background: var(--bg-status);
  border-top: 1px solid rgba(255,255,255,0.04);
  padding: 1px 8px 2px;
  gap: 2px;
  font-size: 0.82em;
  white-space: nowrap;
  overflow: hidden;
  flex-shrink: 0;
  user-select: none;
}
.sb { padding: 1px 4px; border-radius: 2px; flex-shrink: 0; }
.sb.shrink { flex-shrink: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.sb.click { cursor: pointer; }
.sb.click:hover { background: rgba(255,255,255,0.08); }
.sb-pos, .sb-ship { color: var(--accent); }
.sb-sep { color: rgba(255,255,255,0.18); padding: 0 2px; flex-shrink: 0; }
.sb-spacer { flex: 1; min-width: 4px; }
.sb-flag { padding: 1px 5px; border-radius: 2px; cursor: default; flex-shrink: 0; }
.sb-flag.off { color: var(--dim); }
.sb-flag.on  { color: var(--yellow); font-weight: bold; cursor: pointer; }
.sb-flag.blink { opacity: 0.25; }
.sb-btn { color: var(--text); cursor: pointer; padding: 1px 5px; border-radius: 2px; flex-shrink: 0; }
.sb-btn:hover { background: rgba(255,255,255,0.10); }
.sb-alpha-lbl { color: var(--dim); font-size: 0.88em; flex-shrink: 0; padding: 0 2px; }

/* ── Barre de titre (mode frameless) ───────────────────────────────────── */
#titlebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(6, 8, 14, 0.40);
  border-bottom: 1px solid var(--border);
  padding: 2px 8px;
  flex-shrink: 0;
  cursor: move;
  user-select: none;
}
#titlebar .tb-title { color: var(--dim); font-size: 0.80em; pointer-events: none; }
#titlebar .tb-close {
  color: var(--dim);
  cursor: pointer;
  padding: 0 4px;
  font-size: 13px;
  opacity: 0.5;
}
#titlebar .tb-close:hover { color: var(--red); opacity: 1; }

/* ── Bouton Choisir inline (fin de ligne trade) ──────────────────────────── */
.tp-btn {
  background: transparent;
  border: 1px solid rgba(0,188,212,0.40);
  color: var(--accent);
  border-radius: 3px; cursor: pointer;
  padding: 0 7px; font-size: 0.82em;
  font-family: var(--font);
  margin-left: 10px;
  vertical-align: middle;
  line-height: 1.5;
}
.tp-btn:hover { background: rgba(0,188,212,0.22); }
.tp-btn.chosen { background: rgba(76,175,80,0.18); border-color: #4caf50; color: #4caf50; cursor: default; }
/* ── Timer barre de statut ─────────────────── */
#sb-timer { display: none; color: var(--accent); cursor: pointer; padding: 1px 5px; border-radius: 2px; font-variant-numeric: tabular-nums; }
#sb-timer.running { display: inline; }
#sb-timer:hover { background: rgba(255,255,255,0.08); }
#sb-timer-sep { display: none; }

/* ── Éditeur de scan ───────────────────────────────────────────────────── */
#scan-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 800;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 8px;
}
#scan-overlay.open { display: flex; }
#scan-box {
  background: rgba(12, 15, 22, 0.98);
  border: 1px solid var(--accent);
  border-radius: 4px;
  width: min(920px, 98vw);
  max-height: 92vh;
  display: flex;
  flex-direction: column;
  font-size: 0.85em;
}

/* Titre */
#scan-box .se-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px; border-bottom: 1px solid var(--border);
  color: var(--accent); font-weight: bold; flex-shrink: 0;
}
#scan-box .se-head button {
  background: none; border: none; color: var(--dim);
  cursor: pointer; font-size: 1em;
}
#scan-box .se-head button:hover { color: var(--red); }

/* Corps : image à gauche + form à droite */
#scan-body {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* Panneau image */
#scan-img-panel {
  width: 340px;
  min-width: 180px;
  max-width: 50%;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: rgba(0,0,0,0.30);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
#scan-img-panel.hidden { display: none; }

#scan-img-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
  cursor: crosshair;
}
#scan-img-el {
  width: 100%;
  height: 100%;
  object-fit: contain;
  transform-origin: 0 0;
  transition: transform 0.1s;
  pointer-events: none;
  display: block;
}
#scan-img-hint {
  position: absolute; bottom: 4px; left: 0; right: 0;
  text-align: center; font-size: 0.76em; color: var(--dim);
  pointer-events: none; user-select: none;
}
#scan-img-zoom-bar {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 6px; border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#scan-img-zoom-bar button {
  background: none; border: 1px solid var(--border); color: var(--dim);
  padding: 0 6px; cursor: pointer; font-size: 1em; border-radius: 2px;
}
#scan-img-zoom-bar button:hover { color: var(--text); background: rgba(255,255,255,0.06); }
#scan-img-zoom-lbl { color: var(--dim); font-size: 0.8em; flex: 1; text-align: center; }

/* Panneau formulaire */
#scan-form-panel {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#scan-box .se-meta {
  display: flex; gap: 10px; padding: 6px 10px;
  border-bottom: 1px solid var(--border); align-items: center;
  flex-shrink: 0;
}
#scan-box .se-meta label { color: var(--dim); white-space: nowrap; }
#scan-box .se-meta input[type=text] {
  flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--text); padding: 2px 6px; font-family: var(--font); font-size: 0.95em;
}
#scan-box .se-meta select {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--text); padding: 2px 4px; font-family: var(--font);
}
#scan-table { overflow-y: auto; flex: 1; }
#scan-table table { width: 100%; border-collapse: collapse; }
#scan-table th {
  position: sticky; top: 0;
  background: rgba(0,0,0,0.6); color: var(--dim);
  padding: 3px 6px; text-align: left; font-weight: normal; font-size: 0.88em;
}
#scan-table td { padding: 2px 4px; border-bottom: 1px solid rgba(255,255,255,0.04); }
#scan-table input {
  width: 100%; background: rgba(255,255,255,0.06); border: 1px solid transparent;
  color: var(--text); padding: 1px 4px; font-family: var(--font); font-size: 0.95em;
}
#scan-table input:focus { border-color: var(--accent); outline: none; }
#scan-table input.num, .scan-inline input.num { text-align: right; }

/* Combobox commodité / stock — transparent au repos */
#scan-table select.se-select,
.scan-inline select.se-select {
  width: 100%; background: transparent; border: 1px solid transparent;
  color: var(--text); padding: 1px 2px; font-family: var(--font); font-size: 0.88em;
  cursor: pointer; appearance: auto;
}
#scan-table select.se-select:hover,
.scan-inline select.se-select:hover { border-color: rgba(0,188,212,0.35); background: rgba(255,255,255,0.05); }
#scan-table select.se-select:focus,
.scan-inline select.se-select:focus { border-color: var(--accent); outline: none; background: rgba(255,255,255,0.08); }
#scan-table select.se-select option,
.scan-inline select.se-select option { background: #0d1018; color: var(--text); }

/* Input prix/qté — borderless au repos, s'allume au clic */
#scan-table input.se-inline,
.scan-inline input.se-inline {
  background: transparent; border: 1px solid transparent;
  color: inherit; font-family: var(--font); font-size: inherit;
}
#scan-table input.se-inline:hover,
.scan-inline input.se-inline:hover { border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.04); }
#scan-table input.se-inline:focus,
.scan-inline input.se-inline:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); outline: none; }

#scan-box .se-foot {
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
  padding: 6px 10px; border-top: 1px solid var(--border); flex-shrink: 0;
}
#scan-box .se-foot .se-source-badge {
  font-size: 0.8em; color: var(--dim); font-style: italic;
}
#scan-box .se-foot .se-btns { display: flex; gap: 8px; }
#scan-box .se-foot button {
  padding: 3px 14px; border: 1px solid var(--border); border-radius: 2px;
  cursor: pointer; font-family: var(--font); font-size: 0.9em;
  background: rgba(255,255,255,0.05); color: var(--text);
}
#scan-box .se-foot button.primary { border-color: var(--accent); color: var(--accent); }
#scan-box .se-foot button:hover { background: rgba(255,255,255,0.12); }

/* ── Sélecteur générique ───────────────────────────────────────────────── */
#select-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 900;
  display: none;
  align-items: center;
  justify-content: center;
}
#select-overlay.open { display: flex; }
#select-box {
  background: rgba(12, 15, 22, 0.98);
  border: 1px solid var(--accent);
  border-radius: 4px;
  width: min(480px, 96vw);
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  font-size: 0.85em;
}
#select-box .sl-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px; border-bottom: 1px solid var(--border);
  color: var(--accent); font-weight: bold;
}
#select-box .sl-head button {
  background: none; border: none; color: var(--dim);
  cursor: pointer; font-size: 1em;
}
#select-box .sl-head button:hover { color: var(--red); }
#select-list {
  overflow-y: auto; flex: 1; padding: 4px 0;
}
#select-list::-webkit-scrollbar { width: 3px; }
#select-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
.sl-item {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 12px; cursor: pointer; user-select: none;
}
.sl-item:hover { background: rgba(0,188,212,0.10); }
.sl-item.sl-focus { background: rgba(0,188,212,0.18); }
.sl-item input[type=checkbox] { flex-shrink: 0; accent-color: var(--accent); }
.sl-item .sl-label { flex: 1; }
.sl-item .sl-meta { color: var(--dim); font-size: 0.88em; white-space: nowrap; }
#select-box .sl-quick {
  display: flex; gap: 6px; padding: 4px 10px;
  border-top: 1px solid var(--border);
}
#select-box .sl-foot {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 6px 10px; border-top: 1px solid var(--border);
}
#select-box .sl-quick button,
#select-box .sl-foot button {

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// ANSI → HTML parser (couvre les codes émis par Rich)
// ═══════════════════════════════════════════════════════════════════════════════
const ANSI = (() => {
  const BFG = {
    30:'#555',31:'#e06c75',32:'#98c379',33:'#e5c07b',
    34:'#61afef',35:'#c678dd',36:'#56b6c2',37:'#abb2bf',
    90:'#5c6370',91:'#ff7b89',92:'#b8f0b8',93:'#fffb8f',
    94:'#88c0f0',95:'#d9a3f0',96:'#0ff',97:'#fff',
  };

  function c256(n) {
    if (n < 16) {
      const t = ['#000','#800','#080','#880','#008','#808','#088','#aaa',
                 '#555','#f55','#5f5','#ff5','#55f','#f5f','#5ff','#fff'];
      return t[n] || '#888';
    }
    if (n >= 232) { const v = 8 + (n-232)*10; return `rgb(${v},${v},${v})`; }
    n -= 16;
    const b=n%6, g=Math.floor(n/6)%6, r=Math.floor(n/36);
    const ci = x => x ? 55+x*40 : 0;
    return `rgb(${ci(r)},${ci(g)},${ci(b)})`;
  }

  function toHtml(raw) {
    const re = /\x1b\[([0-9;]*)([mKJH])/g;
    let st = {b:false,d:false,i:false,u:false,fg:null,bg:null};
    const segs = [];
    let last = 0, m;

    function style() {
      const s=[];
      if (st.fg) s.push(`color:${st.fg}`);
      if (st.bg) s.push(`background:${st.bg}`);
      if (st.b && !st.d) s.push('font-weight:bold');
      if (st.d) s.push('opacity:0.50');
      if (st.i) s.push('font-style:italic');
      if (st.u) s.push('text-decoration:underline');
      return s.join(';');
    }

    while ((m = re.exec(raw)) !== null) {
      if (m.index > last) segs.push({s:style(), t:raw.slice(last, m.index)});
      last = m.index + m[0].length;
      if (m[2] !== 'm') continue;
      const codes = m[1] ? m[1].split(';').map(Number) : [0];
      let ci = 0;
      while (ci < codes.length) {
        const c = codes[ci++];
        if      (c===0)  { st={b:false,d:false,i:false,u:false,fg:null,bg:null}; }
        else if (c===1)  st.b=true;
        else if (c===2)  st.d=true;
        else if (c===3)  st.i=true;
        else if (c===4)  st.u=true;
        else if (c===22) { st.b=false; st.d=false; }
        else if (c===23) st.i=false;
        else if (c===24) st.u=false;
        else if (c>=30&&c<=37) st.fg=BFG[c];
        else if (c===38) {
          const sub=codes[ci++];
          if (sub===5) st.fg=c256(codes[ci++]);
          else if (sub===2) st.fg=`rgb(${codes[ci++]},${codes[ci++]},${codes[ci++]})`;
        }
        else if (c===39) st.fg=null;
        else if (c>=40&&c<=47) st.bg=BFG[c+(-10)];  // rough
        else if (c===48) {
          const sub=codes[ci++];
          if (sub===5) st.bg=c256(codes[ci++]);
          else if (sub===2) st.bg=`rgb(${codes[ci++]},${codes[ci++]},${codes[ci++]})`;
        }
        else if (c===49) st.bg=null;
        else if (c>=90&&c<=97) st.fg=BFG[c];
      }
    }
    if (last < raw.length) segs.push({s:style(), t:raw.slice(last)});

    return segs.map(seg => {
      const e = seg.t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return seg.s ? `<span style="${seg.s}">${e}</span>` : e;
    }).join('');
  }

  return {toHtml};
})();

// ═══════════════════════════════════════════════════════════════════════════════
// Application
// ═══════════════════════════════════════════════════════════════════════════════
const WS_PORT = __WS_PORT__;   // injecté par Python

let ws = null;
let history = [];
let histIdx = -1;
let histSave = '';
let completions = [];
let compIdx = -1;
let scanSc = false, scanLog = false;
let blinkState = false;
let currentShips = [];
let currentShip  = '';
let currentPos   = '';
let currentDest  = '';
let overlayAlpha = 0.76;

// ── Vocabulaire & annotation ──────────────────────────────────────────────────

const vocab = {
  commodities:    new Set(),
  commoditiesRaw: [],
  locations:      new Set(),
  ships:          new Set(),
  voyages:        new Set(),
};
let vocabRe = null;
const vocabFullNames = new Map();  // lowercase → nom complet canonique (pour tooltip hover)

function loadVocab(msg) {
  vocabFullNames.clear();
  vocab.commoditiesRaw = (msg.commodities || []).slice().sort();   // casse originale pour les <select>

  const _fill = (set, arr) => {
    set.clear();
    for (const n of (arr || [])) { set.add(n.toLowerCase()); vocabFullNames.set(n.toLowerCase(), n); }
  };
  _fill(vocab.commodities, msg.commodities);
  _fill(vocab.locations,   msg.locations);
  _fill(vocab.ships,       msg.ships);
  _fill(vocab.voyages,     msg.voyages);

  // Construire la regex — termes triés par longueur décroissante
  const all = [...(msg.commodities || []), ...(msg.locations || []), ...(msg.ships || []), ...(msg.voyages || [])]
    .filter(w => w && w.length >= 3)
    .sort((a, b) => b.length - a.length)
    .map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));

  vocabRe = all.length
    ? new RegExp(`(?<![\\w-])(${all.join('|')})(?![\\w-])`, 'gi')
    : null;
}

function vocabType(word) {
  const lc = word.toLowerCase();
  if (vocab.commodities.has(lc)) return 'commodity';
  if (vocab.locations.has(lc))   return 'location';
  if (vocab.ships.has(lc))       return 'ship';
  if (vocab.voyages.has(lc))     return 'voyage';
  return null;
}

// Retourne vrai si `haystack` commence par `needle` suivi d'un séparateur (espace, point, parenthèse…)
function _vocabWordPrefix(haystack, needle) {
  if (!haystack.startsWith(needle)) return false;
  if (haystack.length === needle.length) return true;
  const c = haystack[needle.length];
  return c === ' ' || c === '.' || c === '(' || c === '[';
}

function annotateNode(textNode) {
  if (!vocabRe && !vocabFullNames.size) return;
  const text = textNode.textContent;
  const isTruncated = text.endsWith('\u2026');

  // ── Passage 1 : regex normale (fonctionne aussi sur texte tronqué partiel) ──
  if (vocabRe) {
    vocabRe.lastIndex = 0;
    if (vocabRe.test(text)) {
      vocabRe.lastIndex = 0;
      const frag = document.createDocumentFragment();
      let last = 0, m;
      while ((m = vocabRe.exec(text)) !== null) {
        if (m.index > last)
          frag.appendChild(document.createTextNode(text.slice(last, m.index)));
        const word = m[1];
        const type = vocabType(word);
        const span = document.createElement('span');
        span.className = `cw cw-${type}`;
        span.dataset.word = word;
        span.dataset.type = type;
        span.title        = vocabFullNames.get(word.toLowerCase()) || word;
        span.textContent  = word;
        frag.appendChild(span);
        last = m.index + word.length;
      }
      if (last < text.length)
        frag.appendChild(document.createTextNode(text.slice(last)));
      textNode.parentNode.replaceChild(frag, textNode);
      return;
    }
  }

  // ── Passage 2 : texte tronqué «…» non reconnu par la regex → préfixe-mot ──
  // Couvre "TerminalNomLong…" et "TermName (Sy…" ou "Sys.Station.ty…"
  if (isTruncated && vocabFullNames.size) {
    const prefix = text.slice(0, -1).trimEnd().toLowerCase();
    if (prefix.length >= 3) {
      for (const [lc, canonical] of vocabFullNames) {
        // terme vocab commence par le préfixe (nom coupé avant la fin du terme)
        // OU préfixe commence par le terme vocab suivi d'un séparateur
        if (lc.startsWith(prefix) || _vocabWordPrefix(prefix, lc)) {
          const type = vocabType(canonical);
          const span = document.createElement('span');
          span.className = `cw cw-${type} cw-truncated`;
          span.dataset.word = canonical;
          span.dataset.type = type;
          span.title        = canonical;
          span.textContent  = text;
          textNode.parentNode.replaceChild(span, textNode);
          return;
        }
      }
    }
  }
}

function annotateElement(el) {
  if (!vocabRe && !vocabFullNames.size) return;
  // Collecter les nœuds texte d'abord (le remplacement invalide l'itérateur)
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(annotateNode);
}

// ── Spinner d'exécution ───────────────────────────────────────────────────────
const SPIN_CHARS = '⣾⣽⣻⢿⡿⣟⣯⣷';
let _spinTimer = null;

function startSpin() {
  if (_spinTimer) return;
  let i = 0;
  const el = document.getElementById('prompt-sym');
  el.classList.add('spin');
  _spinTimer = setInterval(() => {
    el.textContent = SPIN_CHARS[i++ % SPIN_CHARS.length];
  }, 80);
}

function stopSpin() {
  if (!_spinTimer) return;
  clearInterval(_spinTimer);
  _spinTimer = null;
  const el = document.getElementById('prompt-sym');
  el.classList.remove('spin');
  el.textContent = '›';
}

function setAlpha(a) {
  overlayAlpha = Math.max(0.10, Math.min(0.99, +a || 0.76));
  document.documentElement.style.setProperty('--alpha', overlayAlpha.toFixed(2));
}
function changeAlpha(delta) {
  setAlpha(overlayAlpha + delta);
  send({type: 'opacity', value: overlayAlpha});
}

const elOutput = document.getElementById('output');
const elInput  = document.getElementById('cmd-input');
const elHint   = document.getElementById('hint-line');
const elComp   = document.getElementById('completion-list');
const elCtx    = document.getElementById('ctx-menu');

// ── WebSocket ─────────────────────────────────────────────────────────────────

function connect() {
  ws = new WebSocket(`ws://localhost:${WS_PORT}`);
  ws.onopen    = () => { ws.send(JSON.stringify({type:'status'})); };
  ws.onmessage = e  => dispatch(JSON.parse(e.data));
  ws.onclose   = () => {
    appendSystem('⬤ Déconnecté — reconnexion dans 2s…');
    setTimeout(connect, 2000);
  };
  ws.onerror = () => {};
}

function dispatch(msg) {
  switch (msg.type) {
    case 'banner':
      appendSystem(msg.text);
      if (msg.opacity !== undefined) setAlpha(msg.opacity);
      if (msg.close_mode !== undefined) applyCloseMode(msg.close_mode);
      break;
    case 'echo':        appendEcho(msg.text); startSpin(); break;
    case 'output':      stopSpin(); appendAnsi(msg.ansi); break;
    case 'done':
      stopSpin();
      // Retour du focus vers la zone de saisie après chaque commande
      if (!document.getElementById('scan-overlay').classList.contains('open'))
        elInput.focus();
      break;
    case 'vocab':       loadVocab(msg); break;
    case 'scan_edit':       enqueueScanEditor(msg.data); break;
    case 'scan_log_inline':     appendScanInline(msg); break;
    case 'mission_scan_list':   showMissionScanList(msg); break;
    case 'screenshot_processed': onScreenshotProcessed(msg); break;
    case 'ocr_queued':           onOcrQueued(msg); break;
    case 'trade_pick':  showTradePick(msg); break;
    case 'select':      showSelectPanel(msg); break;
    case 'status':      updateStatus(msg); break;
    case 'completions': showComps(msg.items); break;
    case 'hint':        elHint.textContent = msg.text; break;
    case 'history':     history = msg.items || []; break;
    case 'quit':
      appendSystem('✓ Fermeture…', '#ff9900');
      setTimeout(() => window.close(), 400);
      break;
  }
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

// ── Fermeture overlay ──────────────────────────────────────────────────────────

let _closeMode = 'normal';
let _closeTimer = null;

function applyCloseMode(mode) {
  _closeMode = mode;
  const btn = document.getElementById('tb-close-btn');
  if (!btn) return;
  if (mode === 'dblclick') {
    btn.title = 'Masquer (double-clic = fermer définitivement)';
  } else {
    btn.title = 'Fermer (ou /quit)';
  }
}

function handleCloseClick() {
  if (_closeMode !== 'dblclick') {
    sendCmd('/quit');
    return;
  }
  // Mode dblclick : 1er clic → masquer ; 2e clic dans 400ms → fermer
  if (_closeTimer !== null) {
    clearTimeout(_closeTimer);
    _closeTimer = null;
    sendCmd('/quit');          // double-clic confirmé → fermeture réelle
  } else {
    _closeTimer = setTimeout(() => {
      _closeTimer = null;
      // Masquer via l'API pywebview
      try {
        if (window.pywebview && window.pywebview.api && window.pywebview.api.hide_window) {
          window.pywebview.api.hide_window().catch(() => {});
        }
      } catch (_) {}
    }, 400);
  }
}

function sendCmd(text) {
  text = text.trim();
  if (!text) return;
  send({type:'cmd', text});
  if (!history.length || history[0] !== text) history.unshift(text);
  if (history.length > 200) history.pop();
  histIdx = -1; histSave = '';
  elInput.value = '';
  closeComps();
  elHint.textContent = '';
}

// ── Sortie ────────────────────────────────────────────────────────────────────

function appendSystem(text, color) {
  const d = document.createElement('div');
  d.className = 'line'; d.style.color = color || 'var(--dim)'; d.textContent = text;
  elOutput.appendChild(d);
  elOutput.scrollTop = elOutput.scrollHeight;
}

function appendEcho(text) {
  const d = document.createElement('div');
  d.className = 'line echo'; d.textContent = text;

elInput.addEventListener('keydown', e => {
  const compVisible = elComp.style.display !== 'none';

  if (e.key === 'Enter') {
    e.preventDefault();
    if (compVisible && compIdx >= 0) { acceptComp(); return; }
    sendCmd(elInput.value);
    return;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (compVisible) { moveComp(-1); return; }
    if (histIdx === -1) histSave = elInput.value;
    if (histIdx < history.length-1) {
      histIdx++;
      elInput.value = history[histIdx];
      elInput.setSelectionRange(elInput.value.length, elInput.value.length);
    }
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (compVisible) { moveComp(1); return; }
    if (histIdx > 0)      { histIdx--; elInput.value = history[histIdx]; }
    else if (histIdx===0) { histIdx=-1; elInput.value = histSave; }
    return;
  }
  if (e.key === 'Escape') { closeComps(); return; }
  if (e.key === 'Tab' || (e.ctrlKey && e.key === ' ')) {
    e.preventDefault();
    if (compVisible && compIdx >= 0) acceptComp();
    else send({type:'complete', text:elInput.value, cursor:elInput.selectionStart});
    return;
  }
  histIdx = -1;
});

elInput.addEventListener('input', () => {
  clearTimeout(elInput._t);
  elInput._t = setTimeout(() => {
    if (elInput.value.length > 0)
      send({type:'complete', text:elInput.value, cursor:elInput.selectionStart});
    else closeComps();
  }, 250);
});

function showComps(items) {
  completions = items;
  compIdx = -1;
  elComp.innerHTML = '';
  if (!items.length) { closeComps(); return; }

  items.forEach((item, i) => {
    const d = document.createElement('div');
    d.className = 'ci';
    d.innerHTML =
      `<span class="cv">${esc(item.value||'')}</span>` +
      (item.hint ? `<span class="ch">${esc(item.hint)}</span>` : '');
    d.addEventListener('mousedown', ev => { ev.preventDefault(); applyComp(item); });
    elComp.appendChild(d);
  });
  elComp.style.display = 'block';
}

function moveComp(d) {
  const items = elComp.querySelectorAll('.ci');
  if (!items.length) return;
  compIdx = Math.max(-1, Math.min(items.length-1, compIdx+d));
  items.forEach((el,i) => el.classList.toggle('sel', i===compIdx));
  if (compIdx >= 0) items[compIdx].scrollIntoView({block:'nearest'});
}

function acceptComp() {
  if (compIdx >= 0 && compIdx < completions.length) applyComp(completions[compIdx]);
  closeComps();
}

function applyComp(item) {
  elInput.value = item.value || '';
  elInput.focus();
  elInput.setSelectionRange(elInput.value.length, elInput.value.length);
  closeComps();
}

function closeComps() {
  elComp.style.display = 'none';
  compIdx = -1; completions = [];
}

// ── Clics sur les mots ────────────────────────────────────────────────────────

function wordAt(e) {
  let range;
  try {
    if (document.caretRangeFromPoint) range = document.caretRangeFromPoint(e.clientX, e.clientY);
    else if (document.caretPositionFromPoint) {
      const p = document.caretPositionFromPoint(e.clientX, e.clientY);
      if (!p) return null;
      range = document.createRange();
      range.setStart(p.offsetNode, p.offset);
    }
    if (!range) return null;
    range.expand('word');
    const w = range.toString().trim().replace(/[^\wÀ-ÿ'\- ]/g,'').trim();
    return (w.length >= 3 && !/^\d+$/.test(w)) ? w : null;
  } catch { return null; }
}

    else sendCmd(`/info ${cw.dataset.word}`);
    return;
  }
  const w = wordAt(e);
  if (w) sendCmd(`/info ${w}`);
});
elOutput.addEventListener('contextmenu', e => {

// ── Drag titlebar (fenêtre frameless) ─────────────────────────────────────────

(function() {
  const tb = document.getElementById('titlebar');
  let startSX, startSY, startWX, startWY, pending = false;

  tb.addEventListener('mousedown', e => {
    if (e.target.classList.contains('tb-close')) return;
    e.preventDefault();
    startSX = e.screenX; startSY = e.screenY;
    startWX = window.screenX; startWY = window.screenY;

    function onMove(me) {
      if (pending) return;
      pending = true;
      const dx = me.screenX - startSX, dy = me.screenY - startSY;
      try {
        window.pywebview.api.move(startWX + dx, startWY + dy)
          .catch(() => {}).finally(() => { pending = false; });
      } catch(_) { pending = false; }
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
})();

// ── Sélecteur générique ───────────────────────────────────────────────────────

let _selectMode  = 'multi';
let _selectItems = [];   // [{idx, label, meta}]
let _selectFocus = -1;

function showSelectPanel(msg) {
  _selectMode  = msg.mode  || 'multi';
  _selectItems = msg.items || [];
  _selectFocus = _selectItems.length ? 0 : -1;

  document.getElementById('sl-title').textContent = msg.title || 'Sélectionner';
  document.getElementById('sl-confirm-btn').textContent = msg.confirm_label || '✓ Valider';
  document.getElementById('sl-quick-bar').style.display = _selectMode === 'multi' ? 'flex' : 'none';

  const list = document.getElementById('select-list');
  list.innerHTML = '';
  _selectItems.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'sl-item' + (i === 0 ? ' sl-focus' : '');
    div.dataset.idx = item.idx;
    if (_selectMode === 'multi') {
      div.innerHTML =
        `<input type="checkbox" id="sl-cb-${i}"${item.selected ? ' checked' : ''}>` +
        `<label class="sl-label" for="sl-cb-${i}">${esc(item.label)}</label>` +
        (item.meta ? `<span class="sl-meta">${esc(item.meta)}</span>` : '');
      div.addEventListener('click', e => {
        if (e.target.tagName !== 'INPUT') {
          const cb = div.querySelector('input');
          cb.checked = !cb.checked;
        }
        _selectFocus = i;
        _updateSelectFocus();
      });
    } else {
      div.innerHTML =
        `<span class="sl-label">${esc(item.label)}</span>` +
        (item.meta ? `<span class="sl-meta">${esc(item.meta)}</span>` : '');
      div.addEventListener('click', () => {
        _selectFocus = i;
        _updateSelectFocus();
        // Single mode : clic = valider immédiatement
        _confirmSelectSingle(i);
      });
    }
    list.appendChild(div);
  });

  document.getElementById('select-overlay').classList.add('open');
}

function _updateSelectFocus() {
  document.querySelectorAll('#select-list .sl-item').forEach((el, i) => {
    el.classList.toggle('sl-focus', i === _selectFocus);
  });
  const focused = document.querySelectorAll('#select-list .sl-item')[_selectFocus];
  if (focused) focused.scrollIntoView({block: 'nearest'});
}

function _confirmSelectSingle(i) {
  const item = _selectItems[i];
  if (!item) { closeSelectPanel(); return; }
  send({type: 'select_confirm', indices: [item.idx]});
  document.getElementById('select-overlay').classList.remove('open');
}

function selectAll() {
  document.querySelectorAll('#select-list input[type=checkbox]')
    .forEach(cb => cb.checked = true);
}

function selectNone() {
  document.querySelectorAll('#select-list input[type=checkbox]')
    .forEach(cb => cb.checked = false);
}

function closeSelectPanel() {
  document.getElementById('select-overlay').classList.remove('open');
  send({type: 'select_cancel'});
}

function confirmSelectPanel() {
  if (_selectMode === 'single') return;   // géré par clic direct
  const indices = [];
  document.querySelectorAll('#select-list .sl-item').forEach((div, i) => {
    const cb = div.querySelector('input[type=checkbox]');
    if (cb && cb.checked) indices.push(_selectItems[i].idx);
  });
  send({type: 'select_confirm', indices});
  document.getElementById('select-overlay').classList.remove('open');
}

// Navigation clavier dans le sélecteur
document.addEventListener('keydown', e => {
  if (!document.getElementById('select-overlay').classList.contains('open')) return;
  if (e.key === 'Escape') { e.stopPropagation(); closeSelectPanel(); return; }
  if (e.key === 'ArrowUp')   { e.preventDefault(); _selectFocus = Math.max(0, _selectFocus-1); _updateSelectFocus(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); _selectFocus = Math.min(_selectItems.length-1, _selectFocus+1); _updateSelectFocus(); return; }
  if (e.key === ' ' && _selectMode === 'multi') {
    e.preventDefault();
    const cb = document.querySelectorAll('#select-list input[type=checkbox]')[_selectFocus];
    if (cb) cb.checked = !cb.checked;
    return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    if (_selectMode === 'single') _confirmSelectSingle(_selectFocus);
    else confirmSelectPanel();
    return;
  }
});

let _imgScale = 1.0;
let _imgOrigin = {x: 0, y: 0};   // position du drag (non implémenté ici, zoom simple)

function imgZoom(delta) {
  _imgScale = Math.max(0.25, Math.min(8.0, _imgScale + delta));
  _applyImgZoom();
}
function imgZoomReset() {
  _imgScale = 1.0;
  _applyImgZoom();
}
function _applyImgZoom() {
  const el = document.getElementById('scan-img-el');
  if (el) el.style.transform = `scale(${_imgScale})`;
  const lbl = document.getElementById('scan-img-zoom-lbl');
  if (lbl) lbl.textContent = Math.round(_imgScale * 100) + '%';
}

(function() {
  // Scroll = zoom sur le panneau image
  document.addEventListener('wheel', e => {
    const panel = document.getElementById('scan-img-wrap');
    if (!panel || !panel.contains(e.target)) return;
    e.preventDefault();
    imgZoom(e.deltaY < 0 ? +0.25 : -0.25);
  }, {passive: false});

  // Clic gauche = toggle zoom 1× ↔ 2.5×
  document.addEventListener('click', e => {
    const wrap = document.getElementById('scan-img-wrap');
    if (!wrap || !wrap.contains(e.target)) return;
    if (e.target.id === 'scan-img-hint') return;
    _imgScale = (_imgScale < 1.5) ? 2.5 : 1.0;
    _applyImgZoom();
  });
})();

const _STOCK_LABELS = ['?', 'Out', 'Very Low', 'Low', 'Medium', 'High', 'Very High', 'Max'];

function _buildNameSelect(i, nameVal) {
  const list = vocab.commoditiesRaw || [];
  let opts = '';
  let found = false;
  list.forEach(n => {
    const sel = n.toLowerCase() === nameVal.toLowerCase();
    if (sel) found = true;
    opts += `<option value="${esc(n)}"${sel ? ' selected' : ''}>${esc(n)}</option>`;
  });
  // Si le nom scanné n'est pas dans le vocab (OCR imparfait), l'ajouter en tête
  if (!found && nameVal)
    opts = `<option value="${esc(nameVal)}" selected>${esc(nameVal)}</option>` + opts;
  return `<select data-i="${i}" data-f="name" class="se-select">${opts}</select>`;
}

function _buildStockSelect(i, stockStatus) {
  const opts = _STOCK_LABELS.map((lbl, idx) =>
    `<option value="${idx}"${idx === (stockStatus || 0) ? ' selected' : ''}>${lbl}</option>`
  ).join('');
  return `<select data-i="${i}" data-f="stock_status" class="se-select">${opts}</select>`;
}

  });

function submitScanInline(btn) {
  if (btn.classList.contains('done')) return;
  const div      = btn.closest('.scan-inline');
  const terminal = div.dataset.terminal;
  const mode     = div.dataset.mode;
  const comms    = [];
  div.querySelectorAll('tbody tr').forEach(tr => {
    const qty = tr.querySelector('[data-f="quantity"]').value;
    comms.push({
      name:         tr.querySelector('[data-f="name"]').value,
      price:        parseInt(tr.querySelector('[data-f="price"]').value)    || 0,
      quantity:     qty !== '' ? parseInt(qty) : null,
      stock_status: parseInt(tr.querySelector('[data-f="stock_status"]').value) || 0,
    });
  });
  send({type: 'scan_confirm', data: {terminal, mode, commodities: comms}});
  btn.textContent = '✓ Envoyé';
  btn.classList.add('done');
  btn.disabled = true;
}

function submitScanInlineRow(btn, idx) {
  if (btn.classList.contains('done')) return;
  const div      = btn.closest('.scan-inline');
  const terminal = div.dataset.terminal;
  const mode     = div.dataset.mode;
  const comms    = [];
  div.querySelectorAll('tbody tr').forEach(tr => {
    const qty = tr.querySelector('[data-f="quantity"]').value;
    comms.push({
      name:         tr.querySelector('[data-f="name"]').value,
      price:        parseInt(tr.querySelector('[data-f="price"]').value)    || 0,
      quantity:     qty !== '' ? parseInt(qty) : null,
      stock_status: parseInt(tr.querySelector('[data-f="stock_status"]').value) || 0,
    });
  });
  send({type: 'scan_confirm', data: {terminal, mode, commodities: comms, single_idx: idx}});
  btn.textContent = '✓';
  btn.classList.add('done');
  btn.disabled = true;
}

function enqueueScanEditor(data) {
  if (_scanData) {
    // Éditeur déjà ouvert → mettre en file d'attente
    _scanQueue.push(data);
    // Mettre à jour le titre pour indiquer la file
    const total = 1 + _scanQueue.length;
    document.getElementById('se-title').textContent =
      document.getElementById('se-title').textContent.replace(/ \(\d+\/\d+\)$/, '')
      + ` (1/${total})`;
    return;
  }
  showScanEditor(data);
}

function _nextScanEditor() {
  if (_scanQueue.length === 0) return;
  showScanEditor(_scanQueue.shift());
}

function showScanEditor(data) {
  _scanData = data;
  document.getElementById('se-terminal').value = data.terminal || '';
  document.getElementById('se-mode').value     = data.mode     || 'buy';

  const queueInfo = _scanQueue.length > 0 ? ` (1/${1 + _scanQueue.length})` : '';
  const sourceLabel = data.source === 'log'
    ? (data.validated ? 'log · validé' : 'log · non soumis')
    : 'OCR';
  document.getElementById('se-title').textContent =
    `Édition scan — ${sourceLabel}${queueInfo}`;

  // Badge source
  const badge = document.getElementById('se-source-badge');
  if (badge) {
    if (data.source === 'log' && !data.validated) {
      badge.textContent = '⚠ données OCR brutes — non encore soumises à UEX';
      badge.style.color = 'var(--yellow)';
    } else if (data.source === 'log' && data.validated) {
      badge.textContent = '✓ prix rechargés depuis UEX (post-correction)';
      badge.style.color = 'var(--green)';
    } else {
      badge.textContent = '';
    }
  }

  // Image
  const imgPanel = document.getElementById('scan-img-panel');
  const imgEl    = document.getElementById('scan-img-el');
  if (data.image_b64 && imgEl && imgPanel) {
    imgEl.src = data.image_b64;
    imgPanel.classList.remove('hidden');
    _imgScale = 1.0;
    _applyImgZoom();
  } else if (imgPanel) {
    imgPanel.classList.add('hidden');
  }

  const tbody = document.getElementById('se-rows');
  tbody.innerHTML = '';
  (data.commodities || []).forEach((c, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${_buildNameSelect(i, c.name || '')}</td>
      <td>${_buildStockSelect(i, c.stock_status)}</td>
      <td><input type="number" class="num se-inline" data-i="${i}" data-f="quantity"
                 value="${c.quantity != null ? c.quantity : ''}" min="0" placeholder="—"></td>
      <td><input type="number" class="num se-inline" data-i="${i}" data-f="price"
                 value="${c.price || ''}" min="0" placeholder="—"></td>
    `;
    tbody.appendChild(tr);
  });

  // Label bouton Passer / Annuler selon file d'attente
  document.getElementById('se-skip-btn').textContent =
    _scanQueue.length > 0 ? `Passer →` : 'Annuler';

  document.getElementById('scan-overlay').classList.add('open');
  // focus le premier champ de prix
  const first = tbody.querySelector('input[data-f="price"]');
  if (first) setTimeout(() => first.focus(), 50);
}

function closeScanEditor() {
  document.getElementById('scan-overlay').classList.remove('open');
  _scanData = null;
  // Ouvrir le prochain scan en attente (s'il y en a un)
  setTimeout(_nextScanEditor, 120);
}

function confirmScan() {
  if (!_scanData) return;
  const data = {
    terminal:    document.getElementById('se-terminal').value.trim(),
    mode:        document.getElementById('se-mode').value,
    commodities: [],
  };
  document.querySelectorAll('#se-rows tr').forEach(tr => {
    const get = f => tr.querySelector(`[data-f="${f}"]`)?.value ?? '';
    data.commodities.push({
      name:         get('name'),
      price:        parseInt(get('price'))        || 0,
      quantity:     get('quantity') !== '' ? parseInt(get('quantity')) : null,
      stock_status: parseInt(get('stock_status')) || 0,
    });
  });
  send({type: 'scan_confirm', data});
  closeScanEditor();
}

// ── Trade pick inline ─────────────────────────────────────────────────────────

let _tradePickData = null;

function showTradePick(msg) {
  _tradePickData = msg;
  const entries = msg.entries || [];
  if (!entries.length) return;

  // Parcourir les lignes du dernier output pour trouver les lignes «▶»
  let eIdx = 0;
  for (const d of _lastAnsiDivs) {
    if (eIdx >= entries.length) break;
    const t = d.textContent.trimStart();
    if (!t.startsWith('\u25b6')) continue;   // ▶

    const e = entries[eIdx++];
    const btn = document.createElement('button');
    btn.className = 'tp-btn';
    btn.textContent = 'Choisir';
    btn.onclick = () => chooseTrade(e.idx, btn);
    d.appendChild(btn);
  }
}

function closeTradePick() {
  _tradePickData = null;
}

function chooseTrade(idx, btn) {
  if (btn && btn.classList.contains('chosen')) return;
  if (btn) { btn.textContent = '\u2713'; btn.classList.add('chosen'); btn.disabled = true; }
  send({type: 'trade_chosen', idx});
  startTimer();
}

// ── Timer chargement ─────────────────────────────────────────────────────────

let _timerInterval = null;
let _timerSecs     = 0;
const _TIMER_MAX   = 300;   // 5 minutes

function startTimer() {
  if (_timerInterval) {
    // Relancer depuis 0 si déjà en cours
    clearInterval(_timerInterval);
    _timerInterval = null;
  }
  _timerSecs = 0;
  _renderTimer();
  const el  = document.getElementById('sb-timer');
  const sep = document.getElementById('sb-timer-sep');
  el.classList.add('running');
  sep.style.display = '';
  _timerInterval = setInterval(() => {
    _timerSecs++;
    _renderTimer();
    if (_timerSecs >= _TIMER_MAX) stopTimer();
  }, 1000);
}

function stopTimer() {
  if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
  const el  = document.getElementById('sb-timer');
  const sep = document.getElementById('sb-timer-sep');
  el.classList.remove('running');
  sep.style.display = 'none';
}

function _renderTimer() {
  const el = document.getElementById('sb-timer');
  if (!el) return;
  const m = Math.floor(_timerSecs / 60);
  const s = _timerSecs % 60;
  el.textContent = `\u23f1 ${m}:${String(s).padStart(2, '0')}`;
}

// Fermer scan-editor avec Échap (le sélecteur gère le sien dans son propre handler)
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && _scanData) { e.stopPropagation(); closeScanEditor(); }
});

// ── Redimensionnement (poignée bas-droite) ────────────────────────────────────

(function() {
  const grip = document.getElementById('resize-grip');
  grip.addEventListener('mousedown', e => {
    e.preventDefault();
    e.stopPropagation();
    const startSX = e.screenX, startSY = e.screenY;
    const startW  = window.outerWidth, startH = window.outerHeight;
    let pending = false;

    function onMove(me) {
      if (pending) return;
      pending = true;
      const nw = Math.max(200, startW + (me.screenX - startSX));
      const nh = Math.max(200, startH + (me.screenY - startSY));
      try {
        window.pywebview.api.resize(nw, nh)
          .catch(() => {}).finally(() => { pending = false; });
      } catch(_) { pending = false; }
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      // Fin du drag → restaurer la transparence DWM (perdue par SetWindowPos)
      try { window.pywebview.api.restore_transparency().catch(() => {}); } catch(_) {}
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
})();

// ── Helper ────────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Démarrage ─────────────────────────────────────────────────────────────────

window.addEventListener('load', () => {
  connect();
  elInput.focus();
});

// Focus input quand la fenêtre (re)prend le focus OS (hotkey toggle)
window.addEventListener('focus', () => { elInput.focus(); });

// Largeur console Rich adaptée à la fenêtre (mis à jour à chaque redimensionnement)
(function() {
  let _colsTimer = null;
  function sendCols() {
    // Mesure la largeur réelle d'un caractère monospace dans le contexte actuel
    const span = document.createElement('span');
    span.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;font-family:inherit;font-size:inherit';
    span.textContent = 'x'.repeat(80);
    document.body.appendChild(span);
    const pxPerChar = span.offsetWidth / 80;
    document.body.removeChild(span);
    const cols = Math.max(40, Math.floor((document.body.clientWidth - 20) / pxPerChar));
    send({type: 'cols', value: cols});
  }
  new ResizeObserver(() => {
    clearTimeout(_colsTimer);
    _colsTimer = setTimeout(sendCols, 80);  // débounce
  }).observe(document.body);
})();

// ── Mission Scan Overlay ──────────────────────────────────────────────────────

let _msSessions = [];   // [{session_id, items:[{file,title,reward,...}]}]

function showMissionScanList(msg) {
  const items   = msg.items || [];
  const pending = msg.n_pending || 0;

  // Grouper par session_id
  const sessMap = {};
  for (const it of items) {
    const sid = it.session_id || '—';
    if (!sessMap[sid]) sessMap[sid] = [];
    sessMap[sid].push(it);
  }
  _msSessions = Object.entries(sessMap).map(([sid, its]) => ({ sid, items: its }));

  const body = document.getElementById('ms-body');
  body.innerHTML = '';

  const pendNote = document.getElementById('ms-pending-note');
  if (pending > 0) {
    pendNote.textContent = `⏳ ${pending} screenshot(s) en cours d'analyse…`;
    pendNote.style.display = '';
  } else {
    pendNote.style.display = 'none';
  }

  document.getElementById('ms-title').textContent =
    `Missions détectées — ${msg.scope || ''} — ${items.length} capture(s)`;

  if (!items.length) {
    body.innerHTML = `<p style="color:var(--dim);margin:8px 0">Aucune mission dans cette fenêtre.</p>`;
  } else {
    for (const sess of _msSessions) {
      const label = sess.sid.replace(/^(\d{4}-\d{2}-\d{2})_session(\d+)$/, '$1 · session $2');
      const head = document.createElement('div');
      head.className = 'ms-session-head';
      head.textContent = label;
      body.appendChild(head);

      const tbl = document.createElement('table');
      tbl.innerHTML = `<thead><tr>
        <th class="ms-cb"><input type="checkbox" title="Tout sélectionner" onchange="msSelSession(this,'${sess.sid}')"></th>
        <th>Heure</th><th>Catégorie</th><th>Titre</th>
        <th>SCU</th><th>Récompense</th><th>Départ</th><th>→</th><th>Arrivée</th><th>Dist.</th>
      </tr></thead>`;
      const tbody = document.createElement('tbody');
      for (const it of sess.items) {
        const tr = document.createElement('tr');
        tr.dataset.file    = it.file;
        tr.dataset.session = sess.sid;
        if (it.already_imported) tr.classList.add('ms-imported');
        const scu    = it.total_scu  ? `${Math.round(it.total_scu)}□` : '—';
        const reward = it.reward     ? `${it.reward.toLocaleString()} aUEC` : '—';
        const src    = (it.sources    || []).slice(0,2).join(', ') || '—';
        const dst    = (it.destinations || []).slice(0,2).join(', ') || '—';
        const errMark = (it.errors && it.errors.length) ? ' <span class="ms-err" title="'+it.errors.join('\n')+'">⚠</span>' : '';
        // Distance : total si une seule dest, sinon chaque segment
        let distHtml = '—';
        const dist = it.distances;
        if (dist && dist.has_data) {
          if (dist.segments.length === 1) {
            const gm = dist.segments[0].gm;
            distHtml = gm >= 1 ? `${gm.toFixed(1)} Gm` : `${Math.round(gm*1000)} Mm`;
          } else {
            distHtml = dist.segments.map(s => {
              const gm = s.gm;
              return gm >= 1 ? `${gm.toFixed(1)}` : `${Math.round(gm*1000)}M`;
            }).join('+') + ' Gm';
          }
        }
        const importedMark = it.already_imported ? ' <span title="Déjà importée" style="color:var(--dim)">✓</span>' : '';
        tr.innerHTML = `
          <td class="ms-cb"><input type="checkbox" ${it.already_imported ? '' : 'checked'} data-file="${it.file}"></td>
          <td class="ms-hour">${it.hour || ''}</td>
          <td class="ms-cat">${it.category_label || it.category || ''}</td>
          <td class="ms-title">${it.title || it.file}${errMark}${importedMark}</td>
          <td class="ms-scu">${scu}</td>
          <td class="ms-reward">${reward}</td>
          <td class="ms-src">${src}</td>
          <td style="color:var(--dim)">→</td>
          <td class="ms-dst">${dst}</td>
          <td class="ms-dist">${distHtml}</td>`;
        // Clic sur la ligne = toggle checkbox
        tr.addEventListener('click', (e) => {
          if (e.target.type === 'checkbox') return;
          const cb = tr.querySelector('input[type=checkbox]');
          if (cb) cb.checked = !cb.checked;
        });
        tbody.appendChild(tr);
      }
      tbl.appendChild(tbody);
      body.appendChild(tbl);
    }
  }

  document.getElementById('mission-scan-overlay').classList.add('open');
}

function msSel(state) {
  document.querySelectorAll('#ms-body input[type=checkbox][data-file]')
    .forEach(cb => cb.checked = state);
  document.querySelectorAll('#ms-body thead input[type=checkbox]')
    .forEach(cb => cb.checked = state);
}

function msSelSession(masterCb, sid) {
  document.querySelectorAll(`#ms-body tr[data-session="${sid}"] input[type=checkbox]`)
    .forEach(cb => cb.checked = masterCb.checked);
}

function closeMissionScan() {
  document.getElementById('mission-scan-overlay').classList.remove('open');
}

function submitMissionScan(addToVoyage) {
  const files = [];
  document.querySelectorAll('#ms-body input[type=checkbox][data-file]:checked')
    .forEach(cb => files.push(cb.dataset.file));
  if (!files.length) { closeMissionScan(); return; }
  closeMissionScan();
  send({ type: 'mission_scan_confirm', data: { files, add_to_voyage: addToVoyage } });
}

// Badge "📷 N" dans la statusbar — spinner OCR
function onOcrQueued(msg) {
  const el  = document.getElementById('sb-screencap');
  const nEl = document.getElementById('sb-screencap-n');
  el.classList.remove('off', 'on');
  el.classList.add('spinning');
  nEl.textContent = '⟳ OCR…';
}

function onScreenshotProcessed(msg) {
  const n       = (msg.n_missions || 0);
  const pending = (msg.pending    || 0);
  const el  = document.getElementById('sb-screencap');
  const nEl = document.getElementById('sb-screencap-n');
  if (pending > 0) {
    // encore des images en queue → garder spinner
    el.classList.remove('off', 'on');
    el.classList.add('spinning');
    nEl.textContent = '⟳ OCR…';
  } else if (n > 0) {
    el.classList.remove('off', 'spinning');
    el.classList.add('on');
    nEl.textContent = n + ' mission' + (n > 1 ? 's' : '');
  } else {
    el.classList.remove('spinning', 'on');
    el.classList.add('off');
  }
}

document.getElementById('sb-screencap').addEventListener('click', () => {
  sendCmd('/mission scan');
});

// Fermer avec Échap
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const ov = document.getElementById('mission-scan-overlay');
    if (ov.classList.contains('open')) { closeMissionScan(); e.stopPropagation(); }
  }
});
